# Run with `dart run ffigen --config ffigen.yaml`.
name: AudiopcBindings
ffi-native:
  asset-id: 'package:audiopc/audiopc.g.dart'
description: |
  Bindings for `src/audiopc.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/audiopc.g.dart'
headers:
  entry-points:
    - 'src/audiopc.h'
  include-directives:
    - 'src/audiopc.h'
comments:
  style: any
  length: full
