name: audiopc
description: "A Rust-powered Flutter FFI audio plugin for local file playback, direct URL streaming, and audio processing via a CPAL backend."
version: 0.1.2+1
homepage: https://app.bustify.dev
repository: https://github.com/thomashandlag/audiopc

environment:
  sdk: ^3.11.1
  flutter: '>=3.7.0'

dependencies:
  flutter_rust_bridge: ^2.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  freezed: ^3.2.5
  flutter_lints: ^6.0.0
  test: ^1.28.0
  build_runner: ^2.15.1


flutter:
  plugin:
    platforms:
      android:
        package: com.thugbn.audiopc
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
