name: audiopc
description: "A new Dart FFI package project."
version: 0.0.1

environment:
  sdk: ^3.11.1

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.2.0
  hooks: ^1.0.0
  native_toolchain_rust: ^1.0.3
  web: ^1.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  test: ^1.28.0


flutter:
  plugin:
    platforms:
      android:
        package: com.example.audiopc
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
