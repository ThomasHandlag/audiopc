name: audiopc
description: "Rust + CPAL powered native audio backend for Flutter desktop via dart:ffi."
version: 0.1.0
repository: https://github.com/ThomasHandlag/audiopc
homepage: https://app.bustify.dev
topics: audio, flutter, ffi, rust, cpal

environment:
  sdk: ^3.7.0
  flutter: '>=3.27.2'

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  hooks: ^1.0.2
  native_toolchain_rust: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  logging: ^1.3.0

